<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jordão & Co · Seu time de agentes</title>
<!--
  ============================================================
  ANTES DE PUBLICAR, troque no bloco <script> lá embaixo (CONFIG):
  produto, nº de agentes, preço e checkoutUrl.
  ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E0D0B;
    --char:#1A1714;
    --char-2:#221E19;
    --cream:#F4EFE4;
    --cream-dim:#CFC7B6;
    --gold:#C9A24B;
    --gold-soft:#E4C77E;
    --muted:#8A8175;
    --line:rgba(201,162,75,.18);
    --bot-bubble:#1C1814;
    --user-bubble:linear-gradient(135deg,#C9A24B,#A8843A);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Jost',sans-serif;
    display:flex;justify-content:center;
    overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background:
      radial-gradient(60% 40% at 50% 0%, rgba(201,162,75,.10), transparent 70%),
      radial-gradient(50% 30% at 50% 100%, rgba(201,162,75,.06), transparent 70%);
    pointer-events:none;z-index:0;
  }
  .app{
    position:relative;z-index:1;
    width:100%;max-width:468px;height:100dvh;
    display:flex;flex-direction:column;
    background:linear-gradient(180deg,#100E0B,#0B0A08);
    border-left:1px solid var(--line);border-right:1px solid var(--line);
  }
  /* header */
  .top{
    display:flex;align-items:center;gap:12px;
    padding:16px 18px;border-bottom:1px solid var(--line);
    background:rgba(14,13,11,.7);backdrop-filter:blur(8px);
  }
  .avatar{
    width:42px;height:42px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--gold-soft), #8a6a25);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-weight:700;color:#1a1308;font-size:18px;
    box-shadow:0 0 0 1px rgba(228,199,126,.35), 0 6px 18px rgba(0,0,0,.4);
  }
  .top .name{font-family:'Cinzel',serif;font-weight:600;letter-spacing:1px;font-size:15px}
  .top .status{font-size:12px;color:var(--gold);display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#6ad07a;box-shadow:0 0 8px #6ad07a}
  .brandmark{margin-left:auto;font-family:'Cinzel',serif;color:var(--muted);font-size:11px;letter-spacing:2px}

  /* chat area */
  .chat{flex:1;overflow-y:auto;padding:22px 16px 8px;display:flex;flex-direction:column;gap:12px}
  .chat::-webkit-scrollbar{width:0}
  .row{display:flex;max-width:86%}
  .row.bot{align-self:flex-start}
  .row.user{align-self:flex-end;justify-content:flex-end}
  .bubble{
    padding:12px 15px;border-radius:18px;font-size:15.5px;line-height:1.5;
    animation:rise .35s ease both;
  }
  .bot .bubble{
    background:var(--bot-bubble);border:1px solid var(--line);
    border-bottom-left-radius:5px;color:var(--cream);
  }
  .bot .bubble strong{color:var(--gold-soft);font-weight:600}
  .user .bubble{
    background:var(--user-bubble);color:#1a1308;font-weight:500;
    border-bottom-right-radius:5px;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* typing */
  .typing{display:flex;gap:5px;padding:14px 16px}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* option buttons */
  .options{display:flex;flex-direction:column;gap:9px;padding:6px 16px 14px;animation:rise .35s ease both}
  .opt{
    text-align:left;padding:13px 16px;border-radius:14px;cursor:pointer;
    background:transparent;border:1px solid var(--line);color:var(--cream);
    font-family:'Jost';font-size:15px;font-weight:400;transition:.18s;
  }
  .opt:hover,.opt:active{border-color:var(--gold);background:rgba(201,162,75,.08);transform:translateX(2px)}

  /* offer card */
  .offer{margin:6px 16px 16px;border:1px solid var(--gold);border-radius:18px;overflow:hidden;animation:rise .4s ease both;background:linear-gradient(180deg,#181410,#120F0C)}
  .offer .cap{padding:14px 18px 6px;font-family:'Cinzel',serif;letter-spacing:1px;font-size:14px;color:var(--gold-soft)}
  .offer .body{padding:4px 18px 14px}
  .offer ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin:8px 0}
  .offer li{font-size:14.5px;color:var(--cream-dim);padding-left:22px;position:relative}
  .offer li::before{content:"✦";position:absolute;left:0;color:var(--gold)}
  .price{display:flex;align-items:baseline;gap:8px;margin:10px 0 4px}
  .price .now{font-family:'Cinzel',serif;font-size:30px;color:var(--cream)}
  .price .was{color:var(--muted);text-decoration:line-through;font-size:15px}
  .cta{
    display:block;text-align:center;margin:12px 0 4px;padding:15px;border-radius:13px;
    background:linear-gradient(135deg,var(--gold),#a8843a);color:#1a1308;
    font-family:'Cinzel',serif;font-weight:600;letter-spacing:.5px;font-size:16px;
    text-decoration:none;box-shadow:0 8px 24px rgba(201,162,75,.25)
  }
  .micro{text-align:center;font-size:12px;color:var(--muted);margin-top:8px}

  /* footer input (decorative) */
  .foot{padding:12px 16px 18px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .foot .fake{flex:1;background:var(--char);border:1px solid var(--line);border-radius:22px;padding:12px 16px;color:var(--muted);font-size:14px}
  .restart{background:none;border:none;color:var(--gold);font-family:'Jost';font-size:13px;cursor:pointer;letter-spacing:.5px}

  .intro-serif{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--cream-dim)}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="avatar">A</div>
    <div>
      <div class="name">ATLAS</div>
      <div class="status"><span class="dot"></span> agente · Jordão & Co</div>
    </div>
    <div class="brandmark">&amp;</div>
  </div>

  <div class="chat" id="chat"></div>
  <div id="dock"></div>

  <div class="foot">
    <div class="fake">Atlas está conduzindo a conversa…</div>
    <button class="restart" onclick="restart()">recomeçar</button>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — troque aqui antes de publicar
   ============================================================ */
const CONFIG = {
  produto: "Esquadrão IA",
  nAgentes: 50,
  precoDe: "197",
  precoPor: "97",
  checkoutUrl: "[CHECKOUT]"                  // <-- seu link de checkout
};

const chat = document.getElementById("chat");
const dock = document.getElementById("dock");

function scroll(){ chat.scrollTop = chat.scrollHeight; }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function userBubble(text){
  const row=document.createElement("div");row.className="row user";
  row.innerHTML=`<div class="bubble">${text}</div>`;
  chat.appendChild(row);scroll();
}

async function botSay(html, delay=900){
  const t=document.createElement("div");t.className="row bot";
  t.innerHTML=`<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(t);scroll();
  await wait(delay);
  t.querySelector(".bubble").innerHTML=html;
  t.querySelector(".bubble").style.padding="12px 15px";
  scroll();
}

function showOptions(opts){
  return new Promise(resolve=>{
    const box=document.createElement("div");box.className="options";
    opts.forEach(o=>{
      const b=document.createElement("button");b.className="opt";b.textContent=o.label;
      b.onclick=()=>{ userBubble(o.label); box.remove(); resolve(o.value); };
      box.appendChild(b);
    });
    dock.appendChild(box);scroll();
  });
}

function showOffer(){
  const wa = CONFIG.checkoutUrl;
  const card=document.createElement("div");card.className="offer";
  card.innerHTML=`
    <div class="cap">⚔️ ${CONFIG.produto} — Completo</div>
    <div class="body">
      <ul>
        <li>${CONFIG.nAgentes} agentes de IA, prontos pra usar</li>
        <li>5 esquadrões montados (Comercial, Marketing, Financeiro, Operação, Autoridade)</li>
        <li>Guia "Comece aqui" + aula ao vivo</li>
        <li>Acesso vitalício + atualizações</li>
      </ul>
      <div class="price">
        <span class="now">R$ ${CONFIG.precoPor}</span>
        <span class="was">R$ ${CONFIG.precoDe}</span>
      </div>
      <a class="cta" href="${wa}">Quero meu esquadrão</a>
      <div class="micro">Acesso imediato · Garantia de 7 dias</div>
    </div>`;
  dock.appendChild(card);scroll();
}

async function flow(){
  await botSay(`Opa! Eu sou o <strong>Atlas</strong>, um agente de IA da Jordão & Co. 👋`, 700);
  await botSay(`Repara: você está conversando com um agente <strong>agora</strong>. É exatamente isso que a gente vende — só que pra <strong>trabalhar no seu negócio</strong>.`, 1300);
  await botSay(`Me conta rapidinho: o que mais te consome tempo hoje?`, 1100);

  const dor = await showOptions([
    {label:"Responder e atender clientes", value:"atendimento"},
    {label:"Criar conteúdo e anúncio", value:"marketing"},
    {label:"Cobrar e organizar o financeiro", value:"financeiro"},
    {label:"Faço tudo sozinho, é demais", value:"tudo"},
  ]);

  const fala = {
    atendimento:"Atendimento é onde a maioria perde venda — cliente que não responde na hora, esfria.",
    marketing:"Conteúdo trava todo mundo no \"não sei o que postar\". Dá pra resolver isso hoje.",
    financeiro:"Cobrar é desconfortável — e por isso muita gente deixa dinheiro na mesa.",
    tudo:"Esse é o ponto: o negócio não pode depender só de você. É pra isso que existe um time."
  };
  await botSay(fala[dor], 1000);
  await botSay(`No <strong>${CONFIG.produto}</strong> tem um agente especialista exatamente pra isso — e mais ${CONFIG.nAgentes-1} pro resto da operação.`, 1300);
  await botSay(`Quer que eu te mostre como funciona ou já quer ver o acesso?`, 900);

  const escolha = await showOptions([
    {label:"Como funciona?", value:"como"},
    {label:"Já quero ver o acesso", value:"oferta"},
  ]);

  if(escolha==="como"){
    await botSay(`Simples: cada agente é um <strong>especialista pronto</strong>. Você copia, cola na IA e ele assume a função — copywriter, SDR, cobrança…`, 1300);
    await botSay(`Sem programar, sem "treinar". Saiu torto? Você ajusta uma linha e melhora na hora.`, 1200);
    await botSay(`E os <strong>esquadrões</strong> são times montados: vários agentes que trabalham juntos numa função. 👇`, 1000);
  }

  await botSay(`Esse é o pacote completo:`, 700);
  showOffer();
}

function restart(){ chat.innerHTML=""; dock.innerHTML=""; flow(); }

flow();
</script>
</body>
</html>
